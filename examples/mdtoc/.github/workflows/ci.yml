name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Tests
        run: uv run pytest -q

  quality:
    name: quality (format + lint + types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Black
        run: uv run black --check .
      - name: isort
        run: uv run isort --check-only .
      - name: flake8
        run: uv run flake8 src tests
      - name: pylint
        run: uv run pylint src/mdtoc
      - name: mypy
        run: uv run mypy src/mdtoc
